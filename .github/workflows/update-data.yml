name: Update WECC Data

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC = 06:00 PDT (07:00 PST in winter)
  workflow_dispatch: {}     # allow manual triggering from Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r fetcher/requirements.txt

      - name: Run fetcher
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python fetcher/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name "wecc-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/dashboard.json
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%d)"
          git push
